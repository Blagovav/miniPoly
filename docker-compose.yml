services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monopoly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monopoly}
      POSTGRES_DB: ${POSTGRES_DB:-monopoly}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monopoly}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    # Production image bakes api/src + shared at build time. Code changes
    # require a `--build` redeploy (not a hot-reload). For local
    # development run `npm run dev` from api/ directly.
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-monopoly}:${POSTGRES_PASSWORD:-monopoly}@postgres:5432/${POSTGRES_DB:-monopoly}
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_URL: http://bot:3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      # Empty default disables /admin (404s for everyone). Set in .env
      # to enable the read-only admin dashboard at /admin?token=<value>.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME:-poly_mini_bot}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:5173}
      API_URL: http://api:3000
      PORT: 3001
      OG_IMAGE_URL: ${OG_IMAGE_URL:-}
      # Force IPv4 DNS resolution. The VPS resolves api.telegram.org to
      # an IPv6 address with no working outbound IPv6 route, so the
      # default DNS order traps every grammy call into a timeout
      # (PR #58 — Stars purchases broke without this).
      NODE_OPTIONS: --dns-result-order=ipv4first
    extra_hosts:
      # Timeweb (the Moscow VPS provider) selectively blocks a subset of
      # Telegram's edge IPs — 149.154.166.110 and 149.154.167.50 time
      # out on TCP 443 from this host, but 149.154.167.220 answers in
      # ~160ms. Without pinning, Node DNS occasionally lands on a blocked
      # IP and every bot operation silently fails — createInvoiceLink
      # failure is what broke Stars purchases (PR #59).
      - "api.telegram.org:149.154.167.220"
    ports:
      - "3001:3001"
    depends_on:
      - api

  web:
    # Multi-stage build: vite build → static dist → nginx :80. VITE_TURN_*
    # are baked into the bundle as build args (must be present at build
    # time, not runtime — changes to .env need a `--build` deploy). API
    # and WS URLs intentionally not passed: the bundle uses same-origin
    # paths (`/api/*`, `/ws`) which Caddy proxies to api:3000.
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_BOT_USERNAME: ${BOT_USERNAME:-poly_mini_bot}
        VITE_TURN_URL: ${VITE_TURN_URL:-}
        VITE_TURN_USER: ${VITE_TURN_USER:-}
        VITE_TURN_PASS: ${VITE_TURN_PASS:-}
    restart: unless-stopped
    # Caddy reaches web on the internal docker network at web:80 — no
    # external port mapping needed and exposing one would just be an
    # unsecured backdoor around the reverse-proxy.

volumes:
  pg_data:
