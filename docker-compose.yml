services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monopoly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monopoly}
      POSTGRES_DB: ${POSTGRES_DB:-monopoly}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monopoly}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-monopoly}:${POSTGRES_PASSWORD:-monopoly}@postgres:5432/${POSTGRES_DB:-monopoly}
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_URL: http://bot:3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      # Empty default disables /admin (404s for everyone). Set in .env
      # to enable the read-only admin dashboard at /admin?token=<value>.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api/src:/app/api/src
      - ./shared:/app/shared

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:5173}
      API_URL: http://api:3000
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - api
    volumes:
      - ./bot/src:/app/bot/src

  web:
    # Multi-stage build: vite build → static dist → nginx :80. VITE_TURN_*
    # are baked into the bundle as build args (must be present at build
    # time, not runtime — changes to .env need a `--build` deploy). API
    # and WS URLs intentionally not passed: the bundle uses same-origin
    # paths (`/api/*`, `/ws`) which Caddy proxies to api:3000.
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_BOT_USERNAME: ${BOT_USERNAME:-poly_mini_bot}
        VITE_TURN_URL: ${VITE_TURN_URL:-}
        VITE_TURN_USER: ${VITE_TURN_USER:-}
        VITE_TURN_PASS: ${VITE_TURN_PASS:-}
    restart: unless-stopped
    # Caddy reaches web on the internal docker network at web:80 — no
    # external port mapping needed and exposing one would just be an
    # unsecured backdoor around the reverse-proxy.

volumes:
  pg_data:
