server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — любой путь возвращает index.html, роутинг решает Vue Router (hash history)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш для статики с хэшами Vite — содержимое всегда определяется именем,
    # immutable safely tells Telegram WebView never to revalidate.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Figma art (mascot, board tiles, bg patterns) — без content-hash в имени,
    # но меняется только когда дизайнер заливает новый pack. 30-дневный
    # max-age убирает 46 If-None-Match-roundtrip'ов с каждого повторного
    # открытия мини-аппа в Telegram. Если когда-нибудь нужно срочно
    # обновить ассет до истечения окна — пересохрани под новым именем
    # (e.g. mascot-2.png) и перебей src в шаблоне; cache-bust через URL
    # надёжнее любых header-фокусов.
    location /figma/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }
}
