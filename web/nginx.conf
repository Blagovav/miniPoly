server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — любой путь возвращает index.html, роутинг решает Vue Router (hash history)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш для статики с хэшами Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
