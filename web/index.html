<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0d68db" />
    <title>Minipoly — Monopoly for Telegram</title>
    <style>
      /* Pre-Vue splash. Matches LoadingScreen.vue 1:1 (Figma 52:5051) so
         the handoff from this static markup → Vue's <LoadingScreen> is
         seamless — both paint the same blue background + logo, and Vue
         takes over without any flash of unstyled content. */
      html, body {
        margin: 0;
        background-color: #0d68db;
        color: #fff;
        overscroll-behavior: none;
      }
      #app { min-height: 100dvh; }
      .boot-splash {
        position: fixed;
        inset: 0;
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background-color: #0d68db;
        background-image:
          linear-gradient(rgba(13, 104, 219, 0.55), rgba(13, 104, 219, 0.55)),
          url('/figma/home/bg-pattern.webp');
        background-size: auto, cover;
        background-position: center, center;
        background-repeat: no-repeat, no-repeat;
        animation: boot-splash-fade 0.3s ease 0.6s forwards;
      }
      .boot-splash__logo {
        /* Same sizing rule as LoadingScreen.vue's .splash__logo so the
           static splash and the Vue splash superimpose pixel-for-pixel. */
        width: min(106vw, 480px);
        height: auto;
        object-fit: contain;
        pointer-events: none;
        transform: translateY(-2%);
        animation: boot-splash-pop 360ms cubic-bezier(0.2, 0.9, 0.3, 1.1);
      }
      @keyframes boot-splash-pop {
        from { opacity: 0; transform: translateY(-2%) scale(0.94); }
        to   { opacity: 1; transform: translateY(-2%) scale(1); }
      }
      @keyframes boot-splash-fade {
        to { opacity: 0; visibility: hidden; }
      }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="app">
      <div class="boot-splash">
        <img class="boot-splash__logo" src="/figma/splash/logo.webp" alt="MiniPoly" />
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
