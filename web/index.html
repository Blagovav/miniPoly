<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#f0e4c8" />
    <title>Minipoly — Monopoly for Telegram</title>
    <style>
      /* Убираем белую вспышку при загрузке / сворачивании */
      html, body { margin: 0; background: #f0e4c8; color: #2a1d10; overscroll-behavior: none; }
      #app { min-height: 100dvh; }
      .boot-loader {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: #f0e4c8; z-index: 999;
        animation: boot-fade 0.3s ease 0.4s forwards;
      }
      .boot-loader__inner {
        display: flex; flex-direction: column; align-items: center; gap: 18px;
      }
      .boot-loader__sigil {
        width: 96px; height: 96px;
        animation: boot-spin 8s linear infinite;
      }
      .boot-loader__title {
        font-family: 'Marcellus SC', 'PT Serif Caption', serif;
        font-size: 22px;
        letter-spacing: 0.18em;
        color: #5a3a9a;
        text-transform: uppercase;
      }
      .boot-loader__dots {
        display: flex; gap: 6px;
      }
      .boot-loader__dots > span {
        width: 5px; height: 5px; border-radius: 50%; background: #5a3a9a;
        animation: boot-dot 1.2s ease-in-out infinite;
      }
      .boot-loader__dots > span:nth-child(2) { animation-delay: 0.15s; }
      .boot-loader__dots > span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @keyframes boot-fade { to { opacity: 0; visibility: hidden; } }
      @keyframes boot-dot {
        0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
        30% { opacity: 1; transform: translateY(-3px); }
      }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="app">
      <div class="boot-loader">
        <div class="boot-loader__inner">
          <svg class="boot-loader__sigil" viewBox="0 0 120 120">
            <path d="M40 38 L80 38 L80 64 Q80 82 60 92 Q40 82 40 64 Z" fill="#5a3a9a" stroke="#3e2272" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M44 38 L46 28 L50 34 L54 24 L60 32 L66 24 L70 34 L74 28 L76 38 Z" fill="#d4a84a" stroke="#8b6914" stroke-width="1" stroke-linejoin="round"/>
            <circle cx="46" cy="28" r="1.3" fill="#8b6914"/>
            <circle cx="54" cy="24" r="1.5" fill="#8b6914"/>
            <circle cx="66" cy="24" r="1.5" fill="#8b6914"/>
            <circle cx="74" cy="28" r="1.3" fill="#8b6914"/>
          </svg>
          <div class="boot-loader__title">Mini · Poly</div>
          <div class="boot-loader__dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
