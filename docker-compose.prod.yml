services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monopoly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-monopoly}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monopoly}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-monopoly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-monopoly}
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_URL: http://bot:3001
      CORS_ORIGIN: ${CORS_ORIGIN:-https://tapcade.online}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL:-https://tapcade.online}
      API_URL: http://api:3000
      PORT: 3001
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: web/Dockerfile.prod
    restart: unless-stopped
    # внешние порты не нужны — только caddy

volumes:
  pg_data:
  caddy_data:
  caddy_config:
