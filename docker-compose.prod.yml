services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monopoly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-monopoly}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monopoly}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-monopoly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-monopoly}
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_URL: http://bot:3001
      CORS_ORIGIN: ${CORS_ORIGIN:-https://tapcade.online}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME:-poly_mini_bot}
      WEBAPP_URL: ${WEBAPP_URL:-https://tapcade.online}
      API_URL: http://api:3000
      PORT: 3001
      # Картинка-превью для shareMessage. Оставь пустым, если нет файла —
      # карточка будет без thumbnail.
      OG_IMAGE_URL: ${OG_IMAGE_URL:-}
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: web/Dockerfile.prod
      args:
        VITE_BOT_USERNAME: ${BOT_USERNAME:-poly_mini_bot}
        VITE_TURN_URL: ${VITE_TURN_URL:-}
        VITE_TURN_USER: ${VITE_TURN_USER:-}
        VITE_TURN_PASS: ${VITE_TURN_PASS:-}
    restart: unless-stopped
    # внешние порты не нужны — только caddy

  # TURN/STUN relay for WebRTC voice chat. Runs on the host network so it can
  # bind the UDP relay port range directly — Docker's NAT-on-NAT would otherwise
  # break ICE. Ops: open 3478/udp, 3478/tcp, 49152-49200/udp on the VPS firewall.
  coturn:
    image: coturn/coturn:4.6-alpine
    restart: unless-stopped
    network_mode: host
    command: >
      -n --log-file=stdout
      --listening-port=3478
      --min-port=49152 --max-port=49200
      --realm=${TURN_REALM:-tapcade.online}
      --fingerprint --lt-cred-mech
      --user=${TURN_USER:-minipoly}:${TURN_PASSWORD}
      --no-cli --no-tls --no-dtls --no-multicast-peers

volumes:
  pg_data:
  caddy_data:
  caddy_config:
